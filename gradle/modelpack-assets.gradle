    compileSdk = 36

    defaultConfig {
        minSdk = 28
    }

    buildTypes {
        release {
            minifyEnabled = false
        }
        create("rcPerfRelease") {
            initWith getByName("release")
            matchingFallbacks += ["release"]
        }
        create("bundledModels") {
            initWith getByName("release")
            matchingFallbacks += ["release"]
        }
    }

    androidResources {
        noCompress += ["litertlm", "tflite", "model"]
    }
}

def prepareBundledModelsAssets = tasks.register(
    "prepareBundledModelsAssets",
    PrepareModelPackAssetsTask,
) {
    description = modelPackDescription
    outputDir.set(bundledModelsAssetRoot)
    inputs.property("sources", modelPackSources.collect { "${it.fileName}:${it.byteSize}:${it.sha256Hex}" }.join("|"))
    inputs.property("chunks", modelPackChunks.collect { "${it.assetFileName}:${it.offset}:${it.byteSize}" }.join("|"))
    inputs.property("bundledModelLayout", modelPackLayout)
    inputs.property("bundledModelsSourceDir", bundledModelsSourceDir.orNull ?: "")

    doLast {
        def assetDir = new File(outputDir.get().asFile, "solin-bundled-models")
        def cacheDir = bundledModelsCacheRoot.asFile
        def sourceDirValue = bundledModelsSourceDir.orNull
        def sourceDir = sourceDirValue?.trim() ? file(sourceDirValue) : null
        def hfCredential = bundledModelsHuggingFaceToken.orNull?.trim()
        def huggingFaceAuthorizationHeader = hfCredential ? "Bearer $hfCredential" : null
        assetDir.deleteDir()
        assetDir.mkdirs()
        cacheDir.mkdirs()

        def sourceFor
        sourceFor = { Map spec ->
            def sourceCandidate = sourceDir == null ? null : new File(sourceDir, spec.fileName as String)
            if (isExpectedSource(sourceCandidate, spec)) {
                return sourceCandidate
            }

            def cached = new File(cacheDir, spec.fileName as String)
            if (isExpectedSource(cached, spec)) {
                return cached
            }

            if (spec.requiresHuggingFaceAuthorization && !huggingFaceAuthorizationHeader) {
                throw new GradleException("Bundled model ${spec.fileName} requires Hugging Face authorization.")
            }

            def tempDownload = new File(cacheDir, "${spec.fileName}.download")
            tempDownload.delete()
            println("Downloading bundled model asset: ${spec.fileName}")
            downloadToFile(spec.downloadUrl as String, tempDownload, huggingFaceAuthorizationHeader)
            if (!isExpectedSource(tempDownload, spec)) {
                throw new GradleException("Bundled model source failed verification: ${spec.fileName}")
            }
            cached.delete()
            if (!tempDownload.renameTo(cached)) {
                throw new GradleException("Unable to publish bundled model source: ${spec.fileName}")
            }
            tempDownload.delete()
            cached
        }

        def sourcesByName = modelPackSources.collectEntries { [(it.fileName): it] }
        def chunkedSourceNames = modelPackChunks.collect { it.sourceFileName } as Set

        modelPackChunks.each { chunk ->
            def sourceSpec = sourcesByName[chunk.sourceFileName]
            if (sourceSpec == null) {
                throw new GradleException("Missing source for chunk ${chunk.assetFileName}: ${chunk.sourceFileName}")
            }
            def source = sourceFor(sourceSpec)
            def target = new File(assetDir, chunk.assetFileName as String)
            if (!target.isFile() || target.length() != chunk.byteSize) {
                copyChunk(source, target, chunk)
            }
            println("Bundled model chunk ready: ${chunk.assetFileName}")
        }

        modelPackSources.findAll { !(it.fileName in chunkedSourceNames) }.each { spec ->
            def source = sourceFor(spec)
            def target = new File(assetDir, spec.fileName as String)
            if (!target.isFile() || target.length() != spec.byteSize) {
                target.parentFile.mkdirs()
                def temp = new File(target.parentFile, "${target.name}.tmp")
                temp.delete()
                temp.withOutputStream { output ->
                    source.withInputStream { input -> output << input }
                }
                if (!isExpectedSource(temp, spec)) {
                    throw new GradleException("Bundled model asset failed verification: ${spec.fileName}")
                }
                target.delete()
                if (!temp.renameTo(target)) {
                    throw new GradleException("Unable to publish bundled model asset: ${spec.fileName}")
                }
            }
            println("Bundled model asset ready: ${spec.fileName}")
        }
    }
}

androidComponents {
    onVariants(selector().withBuildType("bundledModels")) { variant ->
        variant.sources.assets?.addGeneratedSourceDirectory(prepareBundledModelsAssets) { it.outputDir }
    }
}

