def bundledModelsAssetRoot = layout.buildDirectory.dir("generated/bundledModels/assets")
def bundledModelsCacheRoot = rootProject.layout.projectDirectory.dir("app/build/bundled-model-cache")

def downloadToFile
downloadToFile = { String url, File outputFile, String authorizationHeader = null ->
    Exception lastFailure = null
    for (int attempt = 0; attempt < 3; attempt++) {
        try {
            def connection = new URI(url).toURL().openConnection()
            if (authorizationHeader) {
                connection.setRequestProperty("Authorization", authorizationHeader)
            }
            connection.connectTimeout = 30_000
            connection.readTimeout = 180_000
            outputFile.withOutputStream { output ->
                connection.inputStream.withCloseable { input -> output << input }
            }
            return
        } catch (Exception error) {
            lastFailure = error
            if (attempt < 2) {
                Thread.sleep(2_000L * (attempt + 1))
            }
        }
    }
    throw new GradleException("Failed to download $url", lastFailure)
}

def sha256
sha256 = { File file ->
    def digest = MessageDigest.getInstance("SHA-256")
    file.withInputStream { input ->
        byte[] buffer = new byte[8192]
        while (true) {
            int read = input.read(buffer)
            if (read <= 0) break
            digest.update(buffer, 0, read)
        }
    }
    digest.digest().collect { String.format("%02x", it & 0xff) }.join()
}

def isExpectedSource
isExpectedSource = { File file, Map spec ->
    file?.isFile() &&
        file.length() == spec.byteSize &&
        sha256(file).equalsIgnoreCase(spec.sha256Hex as String)
}

def copyChunk
copyChunk = { File sourceFile, File target, Map chunk ->
    target.parentFile.mkdirs()
    def temp = new File(target.parentFile, "${target.name}.tmp")
    temp.delete()
    sourceFile.withInputStream { input ->
        long skipped = 0L
        while (skipped < chunk.offset) {
            long delta = input.skip((chunk.offset as Long) - skipped)
            if (delta <= 0L) {
                throw new GradleException("Unable to seek ${chunk.assetFileName}")
            }
            skipped += delta
        }
        temp.withOutputStream { output ->
            byte[] buffer = new byte[8192]
            long remaining = chunk.byteSize as Long
            while (remaining > 0L) {
                int read = input.read(buffer, 0, Math.min(buffer.length as long, remaining) as int)
                if (read <= 0) {
                    throw new GradleException("Unexpected EOF while writing ${chunk.assetFileName}")
                }
                output.write(buffer, 0, read)
                remaining -= read
            }
        }
    }
    if (temp.length() != chunk.byteSize) {
        throw new GradleException(
            "Unexpected chunk size for ${chunk.assetFileName}: ${temp.length()} (expected ${chunk.byteSize})"
        )
    }
    target.delete()
    if (!temp.renameTo(target)) {
        throw new GradleException("Unable to publish chunk ${chunk.assetFileName}")
    }
}

